name: eVaka Deployment Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [evaka-pr-merged, evakaoulu-deployed, evakaturku-deployed, trevaka-deployed]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deployment-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Log trigger source
        run: |
          echo "### Trigger Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "- **Type:** ${{ github.event.action }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Source:** ${{ github.event.client_payload.source || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Environment:** ${{ github.event.client_payload.environment || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "- **Schedule:** every 5 minutes" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Pull latest data
        run: git pull --ff-only

      - name: Run deployment monitor
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_ESPOO: ${{ secrets.SLACK_WEBHOOK_URL_ESPOO }}
          SLACK_WEBHOOK_URL_TAMPERE_REGION: ${{ secrets.SLACK_WEBHOOK_URL_TAMPERE_REGION }}
          SLACK_WEBHOOK_URL_OULU: ${{ secrets.SLACK_WEBHOOK_URL_OULU }}
          SLACK_WEBHOOK_URL_TURKU: ${{ secrets.SLACK_WEBHOOK_URL_TURKU }}
          STAGING_INSTANCES: ${{ secrets.STAGING_INSTANCES }}
          OULU_STAGING_USER: ${{ secrets.OULU_STAGING_USER }}
          OULU_STAGING_PASS: ${{ secrets.OULU_STAGING_PASS }}
          ESPOO_STAGING_USER: ${{ secrets.ESPOO_STAGING_USER }}
          ESPOO_STAGING_PASS: ${{ secrets.ESPOO_STAGING_PASS }}
          SLACK_CHANGE_WEBHOOK_CORE: ${{ secrets.SLACK_CHANGE_WEBHOOK_CORE }}
          SLACK_CHANGE_WEBHOOK_TAMPERE_REGION: ${{ secrets.SLACK_CHANGE_WEBHOOK_TAMPERE_REGION }}
          SLACK_CHANGE_WEBHOOK_OULU: ${{ secrets.SLACK_CHANGE_WEBHOOK_OULU }}
          SLACK_CHANGE_WEBHOOK_TURKU: ${{ secrets.SLACK_CHANGE_WEBHOOK_TURKU }}
        run: npx tsx src/index.ts

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update deployment data [skip ci]"
          git push

  deploy:
    needs: monitor
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest data
        run: git pull --ff-only

      - name: Prepare site
        run: |
          mkdir -p dist
          cp -rL site/* dist/
          cp -r data dist/data

      - name: Generate site version file
        run: echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)-$(git rev-parse --short HEAD)" > dist/data/site-version.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
